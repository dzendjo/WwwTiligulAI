# nginx for new.tiligul.club — static Astro build served behind Traefik.
# Traefik already terminates TLS; nginx listens on plain :80 inside the container.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Astro's sitemap uses .xml — ensure correct content-type:
  types { application/manifest+json webmanifest; }

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 30;
  server_tokens off;

  # Compression — Traefik can also do it but cheaper to gzip at origin.
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml application/xml application/xml+rss
    application/javascript application/json application/manifest+json
    image/svg+xml font/woff2 application/wasm;

  log_format main '$remote_addr "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Traefik terminates TLS — we set HSTS here since Traefik labels don't include it).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 301 redirects use absolute HTTPS so we don't bounce client through an extra
    # http→https hop from Traefik. Traefik already forwards X-Forwarded-Proto=https.
    location = /glamping     { return 301 https://$host/camping; }
    location = /kiteschool   { return 301 https://$host/kite; }
    location = /kite-school  { return 301 https://$host/kite; }
    location = /menu         { return 301 https://$host/cafe; }
    location = /restaurant   { return 301 https://$host/cafe; }
    location = /about-us     { return 301 https://$host/about; }
    location = /booking      { return 301 https://$host/beach; }
    location = /contact      { return 301 https://$host/contacts; }

    # ---- Long-cache fingerprinted assets ----
    location /_assets/ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # Self-hosted fonts — stable names; long cache OK.
    location /fonts/ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # Videos and brand images — week-long cache.
    location ~ ^/(videos|images)/ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      try_files $uri =404;
    }

    # ---- Astro static site: serve trailing-slash variants then 404 ----
    location / {
      # Astro builds /beach/index.html, /camping/index.html, etc.
      try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;
  }
}
