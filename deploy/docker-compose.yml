version: "3.7"
services:
  newtiligul:
    image: nginx:1.27-alpine
    container_name: newtiligul
    restart: on-failure
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.newtiligul.rule=Host(`new.tiligul.club`)
      - traefik.http.routers.newtiligul.entrypoints=websecure
      - traefik.http.routers.newtiligul.tls.certresolver=letsencrypt
      - traefik.http.routers.newtiligul.service=newtiligul
      - traefik.http.services.newtiligul.loadbalancer.server.port=80
    networks:
      - service

networks:
  service:
    external:
      name: docker_network
