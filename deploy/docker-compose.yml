services:
  tiligulclub:
    image: nginx:1.27-alpine
    container_name: tiligulclub
    restart: on-failure
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      # Primary host + www alias (Traefik will request a Let's Encrypt cert covering both).
      - traefik.http.routers.tiligulclub.rule=Host(`tiligul.club`) || Host(`www.tiligul.club`)
      - traefik.http.routers.tiligulclub.entrypoints=websecure
      - traefik.http.routers.tiligulclub.tls.certresolver=letsencrypt
      - traefik.http.routers.tiligulclub.service=tiligulclub
      - traefik.http.services.tiligulclub.loadbalancer.server.port=80
      # Permanent redirect www → apex (defined as middleware, applied to a dedicated router on www only).
      - traefik.http.middlewares.tiligul-www-to-apex.redirectregex.regex=^https?://www\.tiligul\.club/(.*)
      - traefik.http.middlewares.tiligul-www-to-apex.redirectregex.replacement=https://tiligul.club/$${1}
      - traefik.http.middlewares.tiligul-www-to-apex.redirectregex.permanent=true
      - traefik.http.routers.tiligulclub-www.rule=Host(`www.tiligul.club`)
      - traefik.http.routers.tiligulclub-www.entrypoints=websecure
      - traefik.http.routers.tiligulclub-www.tls.certresolver=letsencrypt
      - traefik.http.routers.tiligulclub-www.middlewares=tiligul-www-to-apex
      - traefik.http.routers.tiligulclub-www.priority=10
      - traefik.http.routers.tiligulclub.priority=1
    networks:
      - service

networks:
  service:
    name: docker_network
    external: true
